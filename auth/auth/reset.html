<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Lastly</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body { font-family: -apple-system, sans-serif; background: #0a0a1a; color: #fff; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; text-align: center; }
    .card { max-width: 360px; padding: 40px; }
    h1 { font-size: 24px; margin-bottom: 12px; }
    p { color: rgba(255,255,255,0.6); line-height: 1.6; margin-bottom: 24px; }
    .btn { display: inline-block; background: rgba(255,210,100,0.25); border: 1.5px solid rgba(255,220,130,0.6); color: #fff; font-size: 17px; font-weight: 600; padding: 16px 32px; border-radius: 14px; text-decoration: none; }
  </style>
  <script>
    window.onload = function() {
      var hash = window.location.hash;
      var appUrl = 'legacyapp://auth/reset' + hash;
      window.location.href = appUrl;
    };
  </script>
</head>
<body>
  <div class="card">
    <h1>Reset your password</h1>
    <p>If the app didn't open automatically, tap the button below.</p>
    <a class="btn" id="openApp" href="#">Open Lastly</a>
  </div>
  <script>
    var hash = window.location.hash;
    document.getElementById('openApp').href = 'legacyapp://auth/reset' + hash;
  </script>
</body>
</html>
